<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('bg.jpg') no-repeat center center/cover;
}

.container {
    text-align: center;
}

.img-box {
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 20px;
    margin: 0 auto 20px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card {
    padding: 20px 40px;
    border-radius: 40px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    font-size: 18px;
    cursor: pointer;
    min-height: 200px;
}

/* typing cursor */
.typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100% {opacity:1;}
    50% {opacity:0;}
}

/* love text */
.love-text {
    opacity: 0;
    transform: scale(0.5);
    animation: lovePop 1.5s ease forwards;
    margin-top: 15px;
}

@keyframes lovePop {
    to {
        opacity: 1;
        transform: scale(1.2);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="img-box">
        <img src="emote.png">
    </div>

    <div class="card typing" id="textBox" onclick="startTyping()">
        Klik Aku 🥺💖
    </div>
</div>

<script>
let started = false;

function startTyping() {
    if (started) return;
    started = true;

    const text = `
Hai NAMA_PACAR 🤍

Selamat pagi yaa cintaa 🥺✨
Hari ini kamu hebat banget udah sampai di titik ini,
jadi jangan ragu sama diri kamu sendiri ya 💕

Ujian hari ini mungkin bikin deg-degan,
tapi aku yakin kamu bisa lewatin semuanya dengan baik 🤍

Kalau nanti kamu capek atau mulai overthinking,
inget aja… ada aku yang selalu doain kamu 🤲💖

Apapun hasilnya nanti,
aku tetap bangga sama kamu 🤗

Aku ga butuh kamu jadi sempurna,
aku cuma butuh kamu tetap berusaha 🤍

Dan hari ini, aku yakin kamu bisa ✨

Semangat yaa cintaa 💕
jangan lupa… aku selalu di pihak kamu 💖
`;

    let i = 0;
    const speed = 35;
    const box = document.getElementById("textBox");
    box.innerHTML = "";

    function typing() {
        if (i < text.length) {
            box.innerHTML += text.charAt(i).replace(/\n/g, "<br>");
            i++;
            setTimeout(typing, speed);
        } else {
            box.classList.remove("typing");

            box.innerHTML += `
            <br><br>
            <div style="font-size:20px;">
                <b>Aku bangga punya kamu 🤍💖</b>
            </div>

            <div class="love-text" style="font-size:28px; color:#ff4d6d;">
                <b>I LOVE YOU NAMA_PACAR 💖</b>
            </div>
            `;
        }
    }

    typing();
}
</script>

</body>
</html>
