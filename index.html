<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #2c2c54, #706fd3, #ff7eb3);
        background-size: 400% 400%;
        animation: bg 10s ease infinite;
    }

    @keyframes bg {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .container {
        text-align: center;
    }

    .img-box {
        width: 120px;
        height: 120px;
        background: white;
        border-radius: 20px;
        margin: 0 auto 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .card {
        padding: 20px 40px;
        border-radius: 40px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255,255,255,0.4);
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
        background: rgba(255,255,255,0.3);
    }
</style>
</head>

<body>

<div class="container">
    <div class="img-box">
        <img src="emote.png" alt="cute">
    </div>

    <div class="card" onclick="showMessage()">
        Klik Aku 🥺
    </div>
</div>

<script>
function showMessage() {
    document.querySelector(".card").innerHTML = `
        Semangat yaa 🤍<br><br>
        Jangan takut ujian ya,<br>
        kamu pasti bisa ✨<br><br>
        Aku selalu dukung kamu 💕
    `;
}
</script>

</body>
</html>
