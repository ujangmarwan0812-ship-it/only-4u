<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: 
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url('bg.jpg') no-repeat center center/cover;
    overflow: hidden;
}

.container {
    text-align: center;
    width: 100%;
}

/* EMOTE */
.img-box {
    width: 150px;
    height: 150px;
    margin: 0 auto 25px;
    border-radius: 25px;
    overflow: hidden;
    background: white;
    animation: float 2s ease-in-out infinite;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* CARD */
.card {
    padding: 30px;
    border-radius: 30px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    border: 2px solid rgba(255,255,255,0.6);
    color: white;
    font-size: 18px;
    width: 90%;
    max-width: 380px;
    margin: auto;
    text-align: center;
    line-height: 1.8;
}

/* typing */
.typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100% {opacity:1;}
    50% {opacity:0;}
}

/* LOVE TEXT */
.love-text {
    opacity: 0;
    transform: scale(0.7);
    animation: loveSmooth 1.5s ease forwards;
    margin-top: 30px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    color: #ff4d6d;
    text-shadow: 0 0 15px rgba(255,77,109,0.8);
}

@keyframes loveSmooth {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* hearts */
.heart {
    position: fixed;
    top: -10px;
    color: pink;
    font-size: 18px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="img-box">
        <img src="emote.gif">
    </div>

    <div class="card typing" id="textBox" onclick="startAll()">
        Klik Aku 🥺💖
    </div>
</div>

<script>
let started = false;

function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

function startAll() {
    if (started) return;
    started = true;
    startHearts();
    startTyping();
}

function startTyping() {
    const text = `
Hai NAMA_PACAR 🤍

Selamat pagi yaa cintaa 🥺✨
Hari ini kamu hebat banget udah sampai di titik ini,
jadi jangan ragu sama diri kamu sendiri ya 💕

Ujian hari ini mungkin bikin deg-degan,
tapi aku yakin kamu bisa lewatin semuanya dengan baik 🤍

Kalau nanti kamu capek atau mulai overthinking,
inget aja… ada aku yang selalu doain kamu 🤲💖

Apapun hasilnya nanti,
aku tetap bangga sama kamu 🤗

Aku ga butuh kamu jadi sempurna,
aku cuma butuh kamu tetap berusaha 🤍

Dan hari ini, aku yakin kamu bisa ✨

Semangat yaa cintaa 💕
jangan lupa… aku selalu di pihak kamu 💖
`;

    let i = 0;
    const speed = 28;
    const box = document.getElementById("textBox");
    box.innerHTML = "";

    function typing() {
        if (i < text.length) {
            box.innerHTML += text.charAt(i).replace(/\n/g, "<br>");
            i++;
            setTimeout(typing, speed);
        } else {
            box.classList.remove("typing");

            box.innerHTML += `
            <br><br>
            <div style="font-size:20px;">
                <b>Aku bangga punya kamu 🤍💖</b>
            </div>

            <div class="love-text">
                I LOVE YOU <br> NAMA_PACAR 💖
            </div>
            `;
        }
    }

    typing();
}
</script>

</body>
</html>
